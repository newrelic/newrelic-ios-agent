name: productionDeploy
on:
  workflow_dispatch:
    # The input version number (ex: 7.4.0) and branch: main are required for the production build.
    inputs:
      version:
        required: true

permissions:
  contents: read

jobs:
  # The deployS3Production job copies the existing build from staging download location to the production download location.
  # The job relies on the existence of the xcframework desired for production promotion at the staging download location url: https://download.newrelic.com/ios-v5/${{ env.version }}.zip
  # inputs: version (String): The version number to promote to production. (ex 7.4.0)
  deployS3Production:
    name: deployS3Production
    runs-on: macos-15
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.setOutput.outputs.version }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Bundler 2.7.2
        run: gem install bundler:2.7.2
      
      - name: Update gem
        run: bundle update

      - name: Install gems
        run: bundle install

      - name: Get name
        run: echo "version=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - id: setOutput
        name: Print name
        run: echo "version=${{ env.version }}"  >> $GITHUB_OUTPUT

      - name: Deploy to production S3
        run: "aws s3 cp s3://nr-downloads-main/ios-v5/NewRelic_XCFramework_Agent_${{ env.version }}.zip s3://nr-downloads-main/ios_agent/ --copy-props none"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

  # The deployProductionSpecs job creates the prod Podspec and Prod Package.swift from template and pushes to cp trunk.
  deployProductionSpecs:
    name: deployProductionSpecs
    runs-on: macos-14
    needs: [deployS3Production]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Main repo
        uses: actions/checkout@v3
        with:
          path: main

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Checkout SPM
        uses: actions/checkout@v3
        with:
          repository: newrelic/newrelic-ios-agent-spm
          token: ${{ secrets.SPM_PAT }}
          path: spm

      - name: Get name
        run: echo "version=${{needs.deployS3Production.outputs.version}}" >> $GITHUB_ENV

      - name: Print XCFramework name
        run: echo "${{ env.version }}"

      - name: Create Prod Podspec for XCFramework version
        continue-on-error: true
        run: |
          cd main

          cp cocoapods/NewRelicAgent.podspec.template NewRelicAgent.podspec
          REPLACE=X.XX
          sed -i bak "s/$REPLACE/${{ env.version }}/g" NewRelicAgent.podspec

          rm NewRelicAgent.podspecbak

          pod trunk push --allow-warnings NewRelicAgent.podspec
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}

      - name: Create Prod Package.swift for XCFramework version
        run: |
          cp main/NewRelic-SwiftPackage/Package.swift.template spm/Package.swift
          cd spm

          REPLACEVER={{VERSION}}
          REPLACECHECKSUM={{CHECKSUM}}

          XCFRAMEWORK_NAME="NewRelic_XCFramework_Agent_${{ env.version }}.zip"
          curl https://download.newrelic.com/ios_agent/$XCFRAMEWORK_NAME -o $XCFRAMEWORK_NAME
          SPM_CHECKSUM=`swift package compute-checksum  ${XCFRAMEWORK_NAME}`

          sed -i bak "s/$REPLACEVER/${{ env.version }}/g" Package.swift
          sed -i -e "s/$REPLACECHECKSUM/$SPM_CHECKSUM/g" Package.swift

          rm Package.swift-e
          rm Package.swiftbak

          rm $XCFRAMEWORK_NAME
                   
          git add Package.swift
          git commit -m "Added build ${{ env.version }}"
          git tag ${{ env.version }}
          git push origin main --tags

          cp Package.swift ../main/

        # At this point we have NewRelicAgent.podspec and Package.swift corresponding to the production build sitting at the repo root.
        # The following step creates a PR containing that new NewRelicAgent.podspec and Package.swift file at the root of the repo.
        # Since production builds are infrequent this creates a PR that must be manually approved and merged.
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v3
        with:
          path: main
          title: "[${{ env.version }}] Production Release"
          branch: "auto-production-release-${{ env.version }}"
          base: main

  # Creates a GitHub Release (and the matching git tag) on this repo using the
  # release notes accumulated on the docs-website `next` branch as the body.
  # `gh release create <tag>` creates the tag at the target commit if it does
  # not already exist, satisfying both the "tag the repo" and "make a Release" asks.
  createGithubRelease:
    name: createGithubRelease
    runs-on: ubuntu-latest
    needs: [deployS3Production, deployProductionSpecs]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    env:
      DOCS_REPO: newrelic/docs-website
      DOCS_HEAD: next
      # Keep in sync with append-docs-release-notes.yml DOCS_FILE.
      DOCS_FILE: src/content/docs/release-notes/mobile-release-notes/ios-release-notes/ios-agent-next.mdx
      VERSION_STRING: ${{ needs.deployS3Production.outputs.version }}
    steps:
      - name: Checkout docs-website (next branch) for release-notes body
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DOCS_REPO }}
          token: ${{ secrets.DOCS_WEBSITE_PAT }}
          ref: ${{ env.DOCS_HEAD }}
          fetch-depth: 1
          path: docs-website

      - name: Build release body from release-notes mdx
        run: |
          set -euo pipefail
          SRC="docs-website/${DOCS_FILE}"
          # Strip the YAML frontmatter (everything up to and including the 2nd
          # `---`), leaving the "New in this release" / "Fixed in this release"
          # sections as the GitHub Release body.
          awk 'done==1 {print} /^---[[:space:]]*$/ {c++; if (c==2) done=1}' "$SRC" > release-body.md
          echo "----- release body -----"
          cat release-body.md

      - name: Create GitHub Release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$VERSION_STRING" \
            --repo "${{ github.repository }}" \
            --target main \
            --title "iOS Agent $VERSION_STRING" \
            --notes-file release-body.md

  # Finalizes the accumulated docs-website release notes: fills in the
  # {VERSION-STRING} and {RELEASE-DATE} placeholders (sourced from the production
  # `version` input and the current date), then marks the draft PR ready for review.
  finalizeDocsReleaseNotes:
    name: finalizeDocsReleaseNotes
    runs-on: ubuntu-latest
    needs: [deployS3Production, deployProductionSpecs]
    if: github.ref == 'refs/heads/main'
    env:
      DOCS_REPO: newrelic/docs-website
      DOCS_BASE: develop
      DOCS_HEAD: next
      # Keep in sync with append-docs-release-notes.yml DOCS_FILE.
      DOCS_FILE: src/content/docs/release-notes/mobile-release-notes/ios-release-notes/ios-agent-next.mdx
      VERSION_STRING: ${{ needs.deployS3Production.outputs.version }}
    steps:
      - name: Checkout docs-website (next branch)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DOCS_REPO }}
          token: ${{ secrets.DOCS_WEBSITE_PAT }}
          ref: ${{ env.DOCS_HEAD }}
          fetch-depth: 0

      - name: Set release date
        run: echo "RELEASE_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Fill in version and release date placeholders
        run: |
          set -euo pipefail
          sed -i \
            -e "s/{VERSION-STRING}/${VERSION_STRING}/g" \
            -e "s/{RELEASE-DATE}/${RELEASE_DATE}/g" \
            "$DOCS_FILE"
          echo "----- finalized frontmatter -----"
          head -n 6 "$DOCS_FILE"

      - name: Commit and push finalized release notes
        run: |
          set -euo pipefail
          git add "$DOCS_FILE"
          if git diff --staged --quiet; then
            echo "No changes to commit (placeholders already filled)."
          else
            git commit -m "chore(release): finalize iOS agent ${VERSION_STRING} release notes"
            git push origin "$DOCS_HEAD"
          fi

      - name: Mark docs release-notes PR ready for review
        env:
          GH_TOKEN: ${{ secrets.DOCS_WEBSITE_PAT }}
        run: |
          set -euo pipefail
          gh pr ready "$DOCS_HEAD" --repo "$DOCS_REPO"
