name: ArchiveNRTestApp

# Pre-release sanity check: can NRTestApp actually be archived and accepted by
# App Store Connect with the just-built agent? Catches signing, entitlement,
# arch-slice, Info.plist privacy, and ITMS-90xxx issues before we publish the
# podspec/SPM manifests.
#
# Two ways to run:
#   - workflow_call:     invoked from main.yml after the staging xcframework deploys.
#   - workflow_dispatch: trigger manually from any branch via the Actions UI for
#                        debugging signing/profile/secrets without pushing to staging.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archive:
    name: Archive + validate NRTestApp
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Install Apple distribution certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          APP_STORE_PROVISION_PROFILE_BASE64: ${{ secrets.APP_STORE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/NRTestApp_AppStore.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$APP_STORE_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

          PROFILE_PLIST=$(security cms -D -i $PP_PATH)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< "$PROFILE_PLIST")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$PROFILE_PLIST")
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Set NRTestApp plist secrets
        env:
          NRTESTAPP_CRASH_COLLECTOR_ADDRESS: ${{ secrets.NRTESTAPP_CRASH_COLLECTOR_ADDRESS }}
          NRTESTAPP_MAIN_COLLECTOR_ADDRESS: ${{ secrets.NRTESTAPP_MAIN_COLLECTOR_ADDRESS }}
          NRTESTAPP_APP_TOKEN: ${{ secrets.NRTESTAPP_APP_TOKEN }}
        run: |
          PLIST_PATH="./Test Harness/NRTestApp/NRAPI-Info.plist"
          /usr/libexec/PlistBuddy -c "Set :crashCollectorAddress ${NRTESTAPP_CRASH_COLLECTOR_ADDRESS}" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Set :collectorAddress ${NRTESTAPP_MAIN_COLLECTOR_ADDRESS}" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Set :NRAPIKey ${NRTESTAPP_APP_TOKEN}" "$PLIST_PATH"

      - name: Write ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>SU7SUNGZJP</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>export</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.newrelic.NRApp.bitcode</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF
          cat $RUNNER_TEMP/ExportOptions.plist

      - name: Archive NRTestApp
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace Agent.xcworkspace \
            -scheme NRTestApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/NRTestApp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=SU7SUNGZJP \
            "PROVISIONING_PROFILE_SPECIFIER=${PROFILE_NAME}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            | xcpretty || exit 1

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NRTestApp.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            | xcpretty || exit 1
          ls -la $RUNNER_TEMP/export/

      - name: Validate IPA against App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$ASC_API_KEY_P8_BASE64" | base64 --decode -o ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          IPA_PATH=$(ls $RUNNER_TEMP/export/*.ipa | head -1)
          echo "Validating $IPA_PATH"
          xcrun altool --validate-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --output-format xml | tee $RUNNER_TEMP/altool-validate.log

      - name: Upload archive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NRTestApp-prerelease-archive
          path: |
            ${{ runner.temp }}/NRTestApp.xcarchive
            ${{ runner.temp }}/export/*.ipa
            ${{ runner.temp }}/altool-validate.log
          retention-days: 7

      - name: Cleanup keychain and key
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8 || true
